# Dependabot configuration for H3.NET.Native.
# Note: the upstream H3 git submodule (external/h3 @ v4.5.0) is pinned and
# upgraded manually, so the gitsubmodule ecosystem is intentionally omitted.
version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "nuget"
    groups:
      nuget-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      # codeql-action ships init/analyze/upload-sarif as separate dependencies
      # that MUST move in lockstep; a split major bump mixes v3+v4 and fails the
      # Analyze step. Group all of them, majors included, into a single PR.
      codeql-action:
        applies-to: version-updates
        patterns:
          - "github/codeql-action*"
        update-types:
          - "major"
          - "minor"
          - "patch"
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
        exclude-patterns:
          - "github/codeql-action*"
        update-types:
          - "minor"
          - "patch"

  # Native build base images: manylinux (Dockerfile.manylinux) and alpine
  # (Dockerfile.alpine) under build/docker/. Keeps the glibc/musl toolchain
  # bases current. Grouped so a single PR bundles minor/patch bumps.
  - package-ecosystem: "docker"
    directory: "/build/docker"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    groups:
      docker:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
