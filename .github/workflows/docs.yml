# Builds the DocFX site and publishes it to GitHub Pages.
#
# MAINTAINER PREREQUISITE: GitHub Pages must be enabled with the Actions source
# (Settings -> Pages -> Build and deployment -> Source: GitHub Actions). The deploy
# job targets the built-in `github-pages` environment.
name: docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Least privilege at the top level; the deploy job elevates only the scopes it needs.
permissions:
  contents: read

# Serialize Pages publishes; do not cancel an in-flight deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # DocFX metadata is compile-time only (no native libh3 needed). Install both
      # majors so the project's net8.0;net10.0 TFMs resolve; global.json selects the SDK.
      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: |
            8.0.x
            10.0.301

      - name: Install DocFX
        run: dotnet tool update --global docfx

      - name: Build documentation
        run: docfx docfx.json

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
