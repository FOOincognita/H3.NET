# OpenSSF Scorecard supply-chain posture analysis.
# Runs on pushes to main, weekly, and whenever a branch protection rule changes
# (so the "Branch-Protection" check stays current). Results are published to the
# OpenSSF API and uploaded to GitHub code scanning as SARIF.
#
# README badge (do NOT add it here; maintainer adds to README):
#   [![OpenSSF Scorecard](https://api.scorecard.dev/projects/github.com/FOOincognita/H3.NET/badge)](https://scorecard.dev/viewer/?uri=github.com/FOOincognita/H3.NET)
name: Scorecard

on:
  push:
    branches:
      - main
  schedule:
    # Weekly, Mondays 08:27 UTC.
    - cron: "27 8 * * 1"
  branch_protection_rule:

# Least privilege at the top level; the analysis job elevates as needed.
permissions:
  contents: read

concurrency:
  group: scorecard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Needed to upload SARIF results to the code-scanning dashboard.
      security-events: write
      # Needed for OIDC to publish results to the OpenSSF API (publish_results).
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to the OpenSSF REST API for the public badge/tracker.
          publish_results: true

      # Upload to GitHub code scanning so findings surface in the Security tab.
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
