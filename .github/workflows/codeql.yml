# CodeQL static analysis for H3NET.Native (C# only).
# Build-mode is "manual": we restore with the committed lock files and run an
# explicit `dotnet build` so CodeQL traces the exact compilation the repo uses
# (more reliable than autobuild for a multi-TFM, CPM + locked-mode project).
# The native libh3 is NOT required to compile the managed binding.
name: CodeQL

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    # Weekly, Mondays 07:13 UTC (off the hour to avoid scheduler contention).
    - cron: "13 7 * * 1"

# Least privilege at the top level; the analyze job elevates as needed.
permissions:
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language:
          - csharp
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: manual

      # global.json pins SDK 10.0.301 for the build; the .NET 8 runtime/SDK is
      # installed so multi-targeted (net8.0) compilation resolves.
      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: |
            8.0.x
            10.0.301

      - name: Restore (locked mode)
        run: dotnet restore H3.NET.slnx --locked-mode

      - name: Build
        run: dotnet build H3.NET.slnx -c Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
